<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Форма</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <form class="form">
      <fieldset>
        <legend>Ваши личные данные</legend>
        <label
          >Ваше имя<input
            type="text"
            name="firstname"
            required
            placeholder="Имя"
        /></label>
        <label class="labelnumber"
          >Ваш возраст<input
            type="number"
            name="age"
            required
            placeholder="Возраст"
        /></label>
        <label
          >Ваш номер телефона<input
            type="tel"
            name="phone"
            inputmode="tel"
            required
            placeholder="Номер телефона"
        /></label>
        <label
          >Ваша почта<input
            type="email"
            name="email"
            required
            placeholder="Почта"
        /></label>
      </fieldset>
      <fieldset>
        <label
          >Сообщение<textarea
            name="message"
            placeholder="Ваше сообщение"
          ></textarea>
        </label>
        <label class="rules"
          ><input type="checkbox" name="rules" required /> Я принимаю
          правила</label
        >
        <button>Отправить</button>
      </fieldset>
    </form>
  </body>
</html>
